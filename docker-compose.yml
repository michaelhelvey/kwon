services:
  kwon:
    build:
      context: ./scripts
      dockerfile: ./Dockerfile.e2e
    platform: linux/arm64
    privileged: true
    volumes:
      - ./target/aarch64-unknown-linux-musl/debug:/opt/kwon-bin
      - ./data:/var/log/kwon
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /run
      - /run/lock
