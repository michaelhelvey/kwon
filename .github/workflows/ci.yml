name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Format / Lint / Build / Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Lint
        run: cargo clippy -- -D warnings

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: check
    env:
      E2E_TARGET: x86_64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2
        with:
          key: e2e

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cross-compile for linux/amd64
        run: cargo build --target $E2E_TARGET

      - name: Write docker-compose override for CI
        run: |
          printf '%s\n' \
            'services:' \
            '  kwon:' \
            '    platform: linux/amd64' \
            '    privileged: true' \
            '    volumes:' \
            '      - ./target/x86_64-unknown-linux-musl/debug:/opt/kwon-bin' \
            '      - ./data:/var/log/kwon' \
            '      - /sys/fs/cgroup:/sys/fs/cgroup:rw' \
            '    tmpfs:' \
            '      - /run' \
            '      - /run/lock' \
            > docker-compose.override.yml

      - name: Start test container
        run: |
          mkdir -p data
          touch ./data/kwon.log
          docker compose up -d --build
          # Wait for systemd to finish booting inside the container
          for i in $(seq 1 30); do
            if docker compose exec kwon systemctl is-system-running --wait 2>/dev/null | grep -qE 'running|degraded'; then
              echo "systemd is ready"
              break
            fi
            echo "Waiting for systemd to boot... ($i)"
            sleep 1
          done

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run e2e tests
        env:
          DOCKER: docker
        run: |
          # ensure rsyslogd is running inside the container
          docker compose exec kwon bash -c \
            "pgrep rsyslogd || (sed -i '/imklog/d' /etc/rsyslog.conf && rsyslogd)"
          uv run --script ./scripts/test.py -v

      - name: Teardown
        if: always()
        run: docker compose down
